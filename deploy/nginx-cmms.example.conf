# Exemplo de site Nginx para o CMMS (PHP + proxy da API FastAPI).
# Copie para /etc/nginx/sites-available/ (ajuste server_name, caminhos e socket PHP-FPM),
# teste com `nginx -t` e recarregue o Nginx.
#
# Convenção:
# - Frontend PHP em / → raiz: frontend/public
# - API em /api/v1/ → proxy para Uvicorn em 127.0.0.1:8000
# - Ficheiros estáticos offline: /assets/vendor/ (popular com: bash scripts/update-frontend-vendor.sh)
#
# --- Segurança (login / senha) ---
# O browser alerta "campos de senha em página não segura" se aceder por HTTP.
# Em produção use HTTPS (Let's Encrypt) e redirecione HTTP → HTTPS (bloco no fim).
#
# --- Se o <script src="/assets/vendor/..."> falhar ---
# 1) No servidor: bash /var/www/html/scripts/update-frontend-vendor.sh (a pasta pode não existir no deploy — está no .gitignore).
# 2) Mantenha o bloco "location ^~ /assets/" abaixo: sem ele, pedidos a ficheiros em falta caem no index.php e devolvem HTML (o JS "quebra").

# --- Produção recomendada: só HTTPS (descomente após `certbot certonly` ou `certbot --nginx`) ---
# server {
#     listen 80;
#     listen [::]:80;
#     server_name sgm.planifer.com.br;
#     location /.well-known/acme-challenge/ {
#         root /var/www/html/frontend/public;
#     }
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

server {
    listen 80;
    # listen [::]:80;
    server_name sgm.planifer.com.br;

    root /var/www/html/frontend/public;
    index index.php;

    client_max_body_size 25M;

    # Hardening básico (ajuste X-Frame-OPTIONS se precisar embutir em iframe)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Estáticos do frontend (vendor offline): não passar ao PHP se o ficheiro não existir
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}

